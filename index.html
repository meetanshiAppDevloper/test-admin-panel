<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master App Builder - Testing Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6200ea; --success: #00c853; --bg: #f0f2f5; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin: 0 0 5px; }
        .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; font-size: 11px; background: #fafafa; }

        .upload-box { border: 2px dashed #bbb; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; background: #fdfdfd; transition: 0.3s; }
        .upload-box:hover { border-color: var(--primary); background: #f5f3ff; }
        #previewImg { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; display: none; margin: 10px auto; border: 1px solid #eee; }

        .btn-build { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 15px rgba(98, 0, 234, 0.3); }
        .btn-build:disabled { background: #bbb; box-shadow: none; cursor: not-allowed; }

        #progressArea { margin-top: 25px; display: none; padding: 15px; background: #f9f9f9; border-radius: 12px; }
        .bar-bg { background: #e0e0e0; height: 10px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { background: linear-gradient(90deg, var(--primary), #b388ff); height: 100%; width: 0%; transition: 0.5s; }
        .status-msg { font-size: 13px; color: var(--primary); font-weight: 600; text-align: center; }

        #downloadBtn { display: none; background: var(--success); color: white; margin-top: 20px; box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3); }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>🚀 Master App Tester</h2>
    <p class="subtitle">Fill details to trigger GitHub Action Build</p>

<div class="input-group">
    <label>Shop Domain (Shopify URL)</label>
    <input type="text" id="shopName" placeholder="e.g. your-store.myshopify.com">
</div>
    
    <div class="input-group">
        <label>App Name</label>
        <input type="text" id="appName" placeholder="e.g. Nike Fashion Store">
    </div>

    <div class="input-group">
        <label>Package ID (Bundle ID)</label>
        <input type="text" id="packageId" placeholder="e.g. com.meetanshi.nike">
    </div>

    <div class="input-group">
        <label>App Logo</label>
        <div class="upload-box" onclick="document.getElementById('logoInput').click()">
            <img id="previewImg" src="">
            <div id="uploadPlaceholder">🖼️ Click to upload PNG Logo</div>
            <input type="file" id="logoInput" accept="image/*" onchange="previewFile(event)" style="display:none;">
        </div>
    </div>

    <div class="input-group">
        <label>Firebase (google-services.json) Content</label>
        <textarea id="firebaseJson" placeholder='Paste the full JSON content from google-services.json here...'></textarea>
    </div>

    <div class="input-group">
        <label>Keystore Base64 (Optional)</label>
        <textarea id="keystoreBase64" placeholder="Paste your .jks Base64 string here for signed APK..."></textarea>
    </div>

    <button id="buildBtn" class="btn-build" onclick="generateApp()">🚀 Generate Branded APK</button>

    <div id="progressArea">
        <div class="status-msg" id="msg">Ready to build...</div>
        <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
        <p style="font-size: 10px; color: #888; text-align: center;">Build takes ~5-10 minutes. Follow progress on GitHub Actions tab.</p>
    </div>

    <button id="downloadBtn" class="btn-build" onclick="downloadApk()">📥 Download Your APK</button>
</div>

<script>
    // --- 🛠️ CONFIGURATION (GitHub માંથી ટોકન બદલી લેવો) ---
    const part1 = "ghp_TxVfX45VYs8cOVB3U";
    const part2 = "LbMri5wKrjQTH1QtIH0";
    const GITHUB_TOKEN = part1 + part2;
    const REPO_OWNER = "meetanshiAppDevloper";
    const REPO_NAME = "Master-shopify-app-builder";
    const IMGBB_KEY = "068f90c846bd27855385aff0380c1ea9"; 
     let directDownloadUrl = ""; 

    function previewFile(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('previewImg');
                img.src = e.target.result;
                img.style.display = "block";
                document.getElementById('uploadPlaceholder').style.display = "none";
            }
            reader.readAsDataURL(file);
        }
    }

   async function generateApp() {
    // .trim() વાપરવાથી આજુબાજુની ખાલી જગ્યા નીકળી જશે
    const name = document.getElementById("appName").value.trim();
    const pkg = document.getElementById("packageId").value.trim();
    const fbJson = document.getElementById("firebaseJson").value.trim();
    const shop = document.getElementById("shopName").value.trim(); 
    const ksBase64 = document.getElementById("keystoreBase64").value.trim();
    const file = document.getElementById("logoInput").files[0];

    // કયું ખાનું ખાલી છે તે જોવા માટે ડેબગિંગ (Console માં દેખાશે)
    console.log("App Name:", name);
    console.log("Package ID:", pkg);
    console.log("Firebase JSON Length:", fbJson.length);
    console.log("Logo File:", file);
    console.log("Shop Domain:", shop);

    // અહીં આપણે 'shop' ને પણ ચેક કરીશું કારણ કે તે જરૂરી છે
    if (!name || !pkg || !file || !fbJson || !shop) {
        return alert("Error: Shop Domain, App Name, Package ID, Logo, and Firebase JSON are required!");
    }

    document.getElementById("buildBtn").disabled = true;
    document.getElementById("progressArea").style.display = "block";

    try {
        // STEP 1: Logo Upload to ImgBB
        updateStatus(10, "Uploading Logo...");
        const formData = new FormData();
        formData.append("image", file);
        const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const imgData = await imgRes.json();
        
        if(!imgData.success) throw new Error("Logo upload failed: " + imgData.error.message);
        const logoUrl = imgData.data.url;

        // STEP 2: Trigger GitHub Actions Dispatch
        updateStatus(30, "Sending Build Command to GitHub...");
        const payload = {
            event_type: "trigger_build",
            client_payload: {
                app_name: name,
                package_id: pkg,
                shop_name: shop,
                logo_url: logoUrl,
                firebase_json: fbJson,
                keystore_base64: ksBase64
            }
        };

        const ghRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
            method: 'POST',
            headers: { 
                'Authorization': `Bearer ${GITHUB_TOKEN}`, 
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(payload)
        });

        if (ghRes.status === 204) {
            updateStatus(40, "Build Queued! Compiling Flutter...");
            startPolling();
        } else {
            const err = await ghRes.json();
            alert("GitHub Error: " + (err.message || "Could not trigger build."));
            document.getElementById("buildBtn").disabled = false;
        }
    } catch (e) { 
        alert("Process Error: " + e.message); 
        document.getElementById("buildBtn").disabled = false;
    }
}

    async function startPolling() {
        let progress = 45;
        const timer = setInterval(async () => {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs?per_page=1`, {
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
                });
                const data = await res.json();
                const run = data.workflow_runs[0];

                if (run.status === "completed") {
                    clearInterval(timer);
                    if (run.conclusion === "success") {
                        updateStatus(100, "Build Successful! Fetching Download Link...");
                        await fetchLatestApk(); // સફળ થયા પછી ડાયરેક્ટ લિંક મેળવશે
                    } else {
                        updateStatus(0, "Build Failed! Check GitHub Action logs.");
                        document.getElementById("buildBtn").disabled = false;
                    }
                } else {
                    if (progress < 96) progress += 1;
                    updateStatus(progress, "Compiling App Source Code... " + progress + "%");
                }
            } catch (e) { console.error("Status Check Error:", e); }
        }, 15000);
    }

    // 📥 લેટેસ્ટ APK ની ડાયરેક્ટ લિંક શોધવા માટેનું નવું ફંક્શન
    async function fetchLatestApk() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/latest`, {
                headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
            });
            const data = await res.json();
            
            // એસેટ્સ (assets) માં .apk ફાઈલ શોધશે
            const apkAsset = data.assets.find(asset => asset.name.endsWith(".apk"));
            
            if (apkAsset) {
                directDownloadUrl = apkAsset.browser_download_url;
                updateStatus(100, "Ready to Download!");
                document.getElementById("downloadBtn").style.display = "block";
            } else {
                alert("APK file not found in the latest release. Redirecting to releases page.");
                directDownloadUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/releases`;
                document.getElementById("downloadBtn").style.display = "block";
            }
        } catch (e) {
            console.error("Fetch Release Error:", e);
            alert("Error fetching download link. Please check GitHub Releases manually.");
        }
    }

    function downloadApk() {
        if (directDownloadUrl) {
            // અદ્રશ્ય લિંક બનાવીને ડાયરેક્ટ ડાઉનલોડ ટ્રિગર કરશે
            const link = document.createElement('a');
            link.href = directDownloadUrl;
            link.download = ''; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            alert("Download link is not ready yet.");
        }
    }
    
    function updateStatus(pct, msg) {
        document.getElementById("bar").style.width = pct + "%";
        document.getElementById("msg").innerText = msg;
    }
</script>

</body>
</html>
